{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}

<div class="card">

    <div class="card-body">

        <h4>Reset Password</h4>

        <p>
            Are you sure you want to reset the password for:

            <strong>{{ user.username }}</strong> ?
        </p>

        <form method="post">

            {% csrf_token %}

            <button type="submit"
                    class="btn btn-danger">
                Reset Password
            </button>

            <a href="{% url 'user_list' %}"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
