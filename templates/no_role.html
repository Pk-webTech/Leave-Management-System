{% extends 'base_auth.html' %}
{% block title %}No Role Assigned{% endblock %}
{% block page_title %}No Role{% endblock %}
{% block content %}
<div class="text-center py-5">
    <i class="bi bi-exclamation-triangle text-warning" style="font-size:4rem;"></i>
    <h4 class="mt-3 fw-bold">No Role Assigned</h4>
    <p class="text-muted">Your account does not have a role assigned yet. Please contact the administrator.</p>
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-danger mt-2">
            <i class="bi bi-box-arrow-left me-2"></i>Logout
        </button>
    </form>
</div>
{% endblock %}
